"salve.event.religious.christian.assumption",locale:"el-GR",notes:"Greek: Happy Panagia! (Used in the lead-up to and on the Assumption)",sources:"https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/"},{id:"el_gr_clean_monday",text:"Καλή Καθαρά Δευτέρα!",eventRef:"salve.event.religious.orthodox.clean_monday",locale:"el-GR",notes:"Greek: Happy Clean Monday",sources:"https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/"},{id:"el_gr_clean_monday_1",text:"Καλή Σαρακοστή!",eventRef:"salve.event.religious.orthodox.clean_monday",locale:"el-GR",notes:"Greek: Happy Lent! (Wishing someone well for the 40-day fast starting on Clean Monday)",sources:"https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/"},{id:"el_gr_good_friday",text:"Καλή Ανάσταση!",eventRef:"salve.event.religious.orthodox.good_friday",locale:"el-GR",notes:"Greek: Happy Resurrection! (Wishing for the upcoming celebration)",sources:"https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/"},{id:"el_gr_holy_spirit_monday",text:"Χρόνια Πολλά!",eventRef:"salve.event.religious.orthodox.holy_spirit_monday",locale:"el-GR",notes:"Greek: Many years!",sources:"https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/"},{id:"el_gr_anniversary_of_the_greek_indepen",text:"Χρόνια Πολλά!",locale:"el-GR",phase:"encounter",notes:"Anniversary of the Greek Independence Day /  Lit. “Many years!”",sources:"https://en.wikipedia.org/wiki/Celebration_of_the_Greek_Revolution",metadata:{WikiData:"Q4158275",date:"25 March"}},{id:"el_gr_ohi_day_october_28_anniversary_o",text:"Χρόνια Πολλά!",locale:"el-GR",phase:"encounter",notes:"Ohi Day (October 28). Anniversary of the refusal to the Italian ultimatum.",sources:"https://en.wikipedia.org/wiki/Ohi_Day",metadata:{WikiData:"Q830166",date:"28 October"}},{id:"el_gr_commemoration_of_the_1973_athens",text:"Καλό Πολυτεχνείο!",locale:"el-GR",phase:"encounter",notes:"Polytechneio: Commemoration of the 1973 Athens Polytechnic uprising against the junta of the colonels (1967–1974).",sources:"https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/",metadata:{WikiData:"Q2628742",date:"17 November"}},{id:"el_gr_basic_hi_hello_often_short_for",text:"Γεια!",locale:"el-GR",formality:"informal",phase:["encounter","parting"],notes:"Basic 'Hi/Hello'. Often short for Γεια σου/σας.",sources:"https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/",transliterations:{"el-Latn":"Ya!"}},{id:"el_gr_informal_hello_to_one_person",text:"Γεια σου!",audienceSize:"1",locale:"el-GR",formality:"informal",phase:["encounter","parting"],notes:"Informal 'Hello' to one person.",sources:"https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/",transliterations:{"el-Latn":"Ya su!"}},{id:"el_gr_formal_hello_to_one_person",text:"Γεια σας!",audienceSize:"1",locale:"el-GR",formality:"formal",phase:["encounter","parting"],notes:"Formal 'Hello' to one person.",sources:"https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/",transliterations:{"el-Latn":"Ya sas!"}},{id:"el_gr_informal_hello_to_a_group",text:"Γεια σας!",audienceSize:">1",locale:"el-GR",formality:"informal",phase:["encounter","parting"],notes:"Informal 'Hello' to a group.",sources:"https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/",transliterations:{"el-Latn":"Ya sas!"}},{id:"el_gr_polite_formal_hello_to_one_perso",text:"Χαίρετε!",audienceSize:">=1",locale:"el-GR",formality:"formal",phase:"encounter",notes:"Polite/Formal 'Hello' to one person or a group.",sources:"https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/",transliterations:{"el-Latn":"Khairete!"}},{id:"el_gr_see_you",text:"Τα λέμε!",locale:"el-GR",phase:"parting",notes:"See you!",sources:"https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/",transliterations:{"el-Latn":"Ta leme!"}},{id:"el_gr_see_you_1",text:"Γεια! Τα λέμε!",locale:"el-GR",phase:"parting",notes:"See you!",sources:"https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/",transliterations:{"el-Latn":"Ya! Ta leme! Ya, ta leme!"}},{id:"el_gr_see_you_2",text:"Γεια, τα λέμε!",locale:"el-GR",phase:"parting",notes:"See you!",sources:"https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/",transliterations:{"el-Latn":"Ya! Ta leme! Ya, ta leme!"}},{id:"el_gr_goodbye_used_for_permanent_or_lo",text:"Αντίο",locale:"el-GR",formality:"formal",phase:"parting",notes:"Goodbye. Used for permanent or long-term parting.",sources:"https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/",transliterations:{"el-Latn":"Adío"}},{id:"el_gr_farewell_more_sophisticated_vers",text:"Εις το επανιδείν!",locale:"el-GR",formality:"formal",phase:"parting",notes:"Farewell. More sophisticated version of 'See you again'. Litt. “To the seeing-each-other-again!”",sources:"https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/",transliterations:{"el-Latn":"Eis to epanidín!"}},{id:"el_gr_kali_mera_good_morning",text:"Καλημέρα!",timeOfDay:"morning",locale:"el-GR",phase:"encounter",notes:["Good morning! (Usually until 12pm)","As in English, Καλημέρα consists of two separate words combined into one: Καλή + μέρα (kalí + méra) = “good” + “morning.”"],sources:"https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/",transliterations:{"el-Latn":"Kaliméra!"}},{id:"el_gr_kali_e_spera_good_afternoon",text:"Καλησπέρα!",timeOfDay:["afternoon","evening"],locale:"el-GR",phase:"encounter",notes:["Good afternoon! (12pm until late evening)","Καλησπέρα consists of two separate words combined into one: Καλή + (ε)σπέρα (kalí + (e)spéra) = “good” + “afternoon.”"],sources:"https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/",transliterations:{"el-Latn":"Kalispéra!"}},{id:"el_gr_have_a_good_afternoon_used_when_",text:"Καλό απόγευμα!",timeOfDay:["midday","afternoon"],locale:"el-GR",phase:"parting",notes:"Have a good afternoon! (Used when parting)
