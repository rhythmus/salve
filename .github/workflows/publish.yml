name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npm run build

      - name: Publish @salve/core
        run: npm publish -w packages/core --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @salve/types
        run: npm publish -w packages/types --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @salve/registry
        run: npm publish -w packages/registry --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @salve/plugin-nameday-remote
        run: npm publish -w packages/plugin-nameday-remote --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
