locale: nl
greetings:
  - text: Welkom
    phase: open
    notes: een ontvangende groet
  - text: '{greeter} heet u welkom'
    phase: open
    notes: 'meestal schriftelijk (op borden e.d.), met een anders verouderde betekenis van heten (benoemen, bevelen, wensen, niet als gewoon genoemd worden)'
    sources: 'https://nl.wikipedia.org/wiki/Groet_(etiquette)#Nederlandstalige_verbale_begroetingen'
  - text: Weest welgekomen
    phase: open
    formality: hyperformal
  - text:
      - Goedendag
      - Goeiendag
    timeOfDay:
      - morning
      - midday
      - afternoon
    phase: open
    formality: formal
    notes: 'Een algemene begroeting met een middeleeuws verleden toen zij voluit luidde: God geve u een goede dag! Met ''goeder dag'' werd ''geluk'' bedoeld'
    sources: 'https://nl.wikipedia.org/wiki/Groet_(etiquette)#Nederlandstalige_verbale_begroetingen'
  - text:
      - Hallo
      - Dag
    phase: open
    formality: informal
  - text:
      - Gedag
      - Daag
      - Hoi
      - Hé
      - Hey
    phase: open
    formality: highly informal
    sources: 'https://nl.wikipedia.org/wiki/Groet_(etiquette)#Nederlandstalige_verbale_begroetingen'
  - text:
      - Dag allemaal!
      - Dag iedereen!
      - Hallo allemaal!
      - Hallo iedereen!
    audienceSize: '>4'
    phase: open
  - text: Goedemorgen
    timeOfDay: morning
    phase: open
    formality: formal
  - text: Goeiemorgen
    timeOfDay: morning
    phase: open
    formality: informal
  - text: Goedemiddag
    timeOfDay:
      - midday
      - afternoon
    phase: open
    formality: formal
  - text: Goeiemiddag
    timeOfDay:
      - midday
      - afternoon
    phase: open
    formality: informal
  - text: Goedenavond
    timeOfDay: evening
    phase: open
    formality: formal
  - text: Goeieavond
    timeOfDay: evening
    phase: open
    formality: informal
  - text: Goedenacht
    timeOfDay: night
    phase: open
    formality: formal
  - text: Goeienacht
    timeOfDay: night
    phase: open
    formality: informal
  - text: Een fijne dag nog
    phase: close
  - text: Tot ziens
    notes: 'Alternatieven: Doeg, Doei, Later, Aju'
    phase: close
  - text: Vaarwel
    notes: 'enigszins formele afscheidsgroet, bijvoorbeeld bij de marine'
    phase: close
  - text: Welterusten
    timeOfDay: night
    phase: close
  - text: Hoogachtend
    setting:
      - email_closing
    notes: 'formeel en schriftelijk, boven de handtekening op een brief'
  - text:
      - Met collegiale groet
      - Met collegiale groeten
      - Collegiale groeten
      - Collegiale groet
    formality: formal
    setting:
      - email_closing
    notes: between colleagues
    relationship:
      - subordinate
      - superior
  - text:
      - Met vriendelijke groet
      - Met vriendelijke groeten
      - Vriendelijke groeten
      - Vriendelijke groet
    setting:
      - email_closing
  - text:
      - Met beleefde groeten
      - Met beleefde groet
    setting:
      - email_closing
  - text: Adieë wa
