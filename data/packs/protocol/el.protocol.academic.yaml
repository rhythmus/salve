# Greek academic protocol pack
#
# Greek academic address uses Αξιότιμε/Αξιότιμη (Honourable) with Κύριε/Κυρία
# and the title in vocative (Καθηγητά, Καθηγήτρια, Δρ.).
# Second person plural is used for formal address.
#
# Sources: Greek formal letter conventions; Preply, TravelWithLanguages.

id: protocol-academic-el
locale: el
requiredSubculture: academic
domain: academic
sources:
  - 'https://preply.com/en/blog/greek-titles/'
  - 'https://travelwithlanguages.com/blog/greek-email-letter-writing-guide.html'
notes: >
  Greek academic protocol: Αξιότιμε κύριε / Αξιότιμη κυρία + title (vocative) + surname.
  Professor and Doctor titles as in baseline address pack; this pack adds domain-specific rules.

titles:
  - system: academic
    code: prof
    rank: 1
    postalForm: Καθ.
    correspondenceForm: Καθηγητά
    gender: male
  - system: academic
    code: prof
    rank: 1
    postalForm: Καθ.
    correspondenceForm: Καθηγήτρια
    gender: female
  - system: academic
    code: dr
    rank: 2
    postalForm: Δρ.
    correspondenceForm: Δρ.

rules:
  - id: el-academic-postal
    priority: 10
    template: "Κύριε/Κυρία {postalTitleStack} {surname}"
    when:
      locale: el
      formality: [formal, hyperformal]
      outputForm: postal
      titleSystem: academic
    notes: "Envelope: Κύριε or Κυρία + titles + surname."

  - id: el-academic-letterhead
    priority: 10
    template: "Αξιότιμε κύριε {correspondenceTitleStack} {surname},"
    when:
      locale: el
      formality: [formal, hyperformal]
      outputForm: letterhead
      titleSystem: academic
    notes: "Female: Αξιότιμη κυρία. Title in vocative (Καθηγητά, Καθηγήτρια, Δρ.)."

  - id: el-academic-salutation
    priority: 10
    template: "{honorific} {correspondenceTitleStack} {surname}"
    when:
      locale: el
      formality: [formal, hyperformal]
      outputForm: salutation
      titleSystem: academic
