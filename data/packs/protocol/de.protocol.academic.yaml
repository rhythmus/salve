# German academic protocol pack
#
# German academic conventions require explicit title stacking:
# "Herr Professor Doktor" in correspondence, "Prof. Dr." on envelopes.
# Professor suppresses Doctor in the title stack when both are present
# in many German letter-writing guides, but the postal form retains both.
#
# Source: https://de.wikipedia.org/wiki/Anrede

id: protocol-academic-de
locale: de
requiredSubculture: academic
domain: academic
sources:
  - 'https://de.wikipedia.org/wiki/Anrede'
notes: >
  German academic protocol: Herr/Frau + highest academic title + surname.
  Professor absorbs Doctor in many style guides.

titles:
  - system: academic
    code: prof
    rank: 1
    postalForm: Prof.
    correspondenceForm: Professor
    gender: male
  - system: academic
    code: prof
    rank: 1
    postalForm: Prof.
    correspondenceForm: Professorin
    gender: female
  - system: academic
    code: dr
    rank: 2
    postalForm: Dr.
    correspondenceForm: Dr.
  - system: academic
    code: dr_habil
    rank: 2
    postalForm: Dr. habil.
    correspondenceForm: Dr. habil.
  - system: academic
    code: pd
    rank: 3
    postalForm: PD Dr.
    correspondenceForm: Privatdozent Dr.

rules:
  - id: de-academic-postal-formal
    priority: 10
    template: "Herrn {postalTitleStack} {surname}"
    when:
      locale: de
      formality: [formal, hyperformal]
      outputForm: postal
      titleSystem: academic
  - id: de-academic-letterhead-formal-male
    priority: 10
    template: "Sehr geehrter Herr {correspondenceTitleStack} {surname},"
    when:
      locale: de
      formality: [formal, hyperformal]
      outputForm: letterhead
      titleSystem: academic
  - id: de-academic-salutation-formal
    priority: 10
    template: "Herr {correspondenceTitleStack} {surname}"
    when:
      locale: de
      formality: [formal, hyperformal]
      outputForm: salutation
      titleSystem: academic
