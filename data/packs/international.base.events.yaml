      en: Happy New Year!
      nl: Gelukkig Nieuwjaar!
      fr: Bonne année !
      de: Frohes neues Jahr!
      el: Καλή χρονιά!
      es: ¡Feliz Año Nuevo!
      it: Buon anno!

