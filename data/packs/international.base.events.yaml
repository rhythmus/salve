# Shared International & Transnational Celebrations
# Used as base definitions for regional augmentation

events:
  # ─── New Year ─────────────────────────────────────────────────────
  - id: salve.event.secular.new_year
    date: 1 January
    WikiData: Q196627
    label:
      en: New Year's Day
      nl: Nieuwjaar
      fr: Nouvel An
      de: Neujahr
      el: Πρωτοχρονιά
      es: Año Nuevo
      it: Capodanno
