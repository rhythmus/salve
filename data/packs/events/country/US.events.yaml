# United States federal and common observances
# Federal holidays and widely observed days (not all are non-working in all states).
# Sources: https://en.wikipedia.org/wiki/Public_holidays_in_the_United_States

country: US
sources:
  - 'https://en.wikipedia.org/wiki/Public_holidays_in_the_United_States'
  - 'https://www.opm.gov/policy-data-oversight/pay-leave/federal-holidays/'

events:

  # ─── January ─────────────────────────────────────────────────────

  - date: 1 January
    label:
      en: New Year's Day
      nl: Nieuwjaarsdag
      el: Πρωτοχρονιά
    WikiData: Q2237444
    category: official
    greetings:
      en: Happy New Year!
      nl: Gelukkig Nieuwjaar!
      el: Καλή χρονιά!

  - date: '01:mon:3'
    label:
      en: Martin Luther King Jr. Day
      nl: Martin Luther King-dag
      el: Ημέρα Martin Luther King
    WikiData: Q131066
    category: official
    greetings:
      en: Happy MLK Day!
      nl: Gelukkige Martin Luther King-dag!
      el: Καλή γιορτή!

  # ─── February ─────────────────────────────────────────────────────

  - date: '02:mon:3'
    label:
      en: Presidents' Day
      nl: Presidentsdag
      el: Ημέρα των Προέδρων
    WikiData: Q755758
    category: official
    notes: Washington's Birthday (federal); often called Presidents' Day.
    greetings:
      en: Happy Presidents' Day!
      nl: Fijne Presidentsdag!
      el: Καλή γιορτή!

  # ─── March ─────────────────────────────────────────────────────

  - date: 17 March
    label:
      en: Saint Patrick's Day
      nl: Sint-Patrick
      el: Αγίου Πατρίκιου
    WikiData: Q121404
    category: observance
    greetings:
      en: Happy St Patrick's Day!
      nl: Gelukkige Sint-Patrick!
      el: Καλή γιορτή Αγίου Πατρίκιου!

  # ─── April ─────────────────────────────────────────────────────

  - date: pascha:-2
    label:
      en: Good Friday
      nl: Goede Vrijdag
      el: Μεγάλη Παρασκευή
    WikiData: Q133247
    category: observance
    notes: Not a federal holiday; observed in some states.
    greetings:
      en: (Observance)
      nl: Stille Goede Vrijdag.
      el: Καλή Ανάσταση

  - date: pascha:0
    label:
      en: Easter Sunday
      nl: Eerste paasdag
      el: Κυριακή του Πάσχα
    WikiData: Q23674
    category: observance
    greetings:
      en: Happy Easter!
      nl: Zalig Pasen!
      el: Καλή Ανάσταση!

  # ─── May ─────────────────────────────────────────────────────

  - date: '05:mon:last'
    label:
      en: Memorial Day
      nl: Memorial Day
      el: Ημέρα Μνήμης
    WikiData: Q178496
    category: official
    greetings:
      en: (Observance; solemn)
      nl: Eerbetoon aan de gevallenen.
      el: (Σεβασμός στη μνήμη των πεσόντων.)

