# Greek Greeting Pack (Greece)
locale: el-GR
greetings:
  # --- Temporal ---
  - id: "el_morning"
    text: "Καλημέρα"
    eventRef: "salve.event.temporal.morning"

  - id: "el_afternoon"
    text: "Καλησπέρα"
    eventRef: "salve.event.temporal.afternoon"

  - id: "el_evening"
    text: "Καλησπέρα"
    eventRef: "salve.event.temporal.evening"

  - id: "el_night"
