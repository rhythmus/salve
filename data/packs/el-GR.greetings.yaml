locale: el-GR
sources: 'https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/'

greetings:
  # --- 1. Saying Hello & Goodbye ---
  - text: Γεια!
    el-Latn: Ya!
    phase: [encounter, parting]
    formality: informal
    notes: Basic 'Hi/Hello'. Often short for Γεια σου/σας.

  - text: Γεια σου!
    el-Latn: Ya su!
    phase: [encounter, parting]
    formality: informal
    audience: 1
    notes: Informal 'Hello' to one person.

  - text: Γεια σας!
    el-Latn: Ya sas!
    phase: [encounter, parting]
    formality: formal
    audience: 1
    notes: Formal 'Hello' to one person.

  - text: Γεια σας!
    el-Latn: Ya sas!
    phase: [encounter, parting]
    formality: informal
    audience: ">1"
    notes: Informal 'Hello' to a group.

  - text: Χαίρετε!
    el-Latn: Khairete!
    phase: encounter
    formality: formal
    audience: 1
    notes: Polite/Formal 'Hello' to one person.

  - text: Χαίρετε!
    el-Latn: Khairete!
    phase: encounter
    formality: neutral
    audience: ">1"
    notes: Formal/Neutral 'Hello' to a group.

  # --- 2. Parting Specifically ---
  - text: Τα λέμε!
    el-Latn: Ta leme!
    phase: parting
    notes: See you!

  - text: Αντίο
    el-Latn: Adio
    phase: parting
    formality: formal
    notes: Goodbye. Used for permanent or long-term separation.

  - text: Εις το επανιδείν!
    el-Latn: Eis to epanidein!
    phase: parting
    formality: formal
    notes: Farewell. More sophisticated version of 'See you again'.

  # --- 3. Time of Day ---
  - text: Καλημέρα!
    el-Latn: Kalimera!
    phase: encounter
    eventRef: salve.event.temporal.morning
    notes: Good morning! (Usually until 12pm)

  - text: Καλησπέρα!
    el-Latn: Kalispera!
    phase: encounter
    eventRef: salve.event.temporal.afternoon
    notes: Good afternoon! (12pm until late evening)

  - text: Καλό απόγευμα!
    el-Latn: Kalo apogevma!
    phase: parting
    notes: Have a good afternoon! (Used when parting)

  - text: Καλό βράδυ!
    el-Latn: Kalo vradi!
    phase: parting
    notes: Have a good evening! (Used when parting)

  - text: Καληνύχτα!
    el-Latn: Kaliníhta!
    phase: parting
    eventRef: salve.event.temporal.night
    notes: Goodnight!

  - text: Όνειρα γλυκά
    el-Latn: Oneira glyka!
    phase: parting
    formality: informal
    notes: Sweet dreams. Usually follows Καληνύχτα.

  # --- 4. Slang & Special ---
  - text: Γεια χαρά!
    el-Latn: Ya khara!
    phase: encounter
    formality: highly informal
    notes: Hey! (Slang)

  - text: Γιο!
    el-Latn: Yo!
    phase: encounter
    formality: highly informal
    notes: Yo! (Slang)

  - text: Χρόνια και ζαμάνια!
    el-Latn: Khronia kai zamania!
    phase: encounter
    notes: Long time no see!

  # --- 5. Meeting New People ---
  - text: Χαίρω πολύ!
    el-Latn: Khaire poli!
    phase: encounter
    notes: Pleased to meet you!

  - text: Χάρηκα!
    el-Latn: Kharika!
    phase: encounter
    notes: Pleased (to have met you)!

  - text: Χαίρομαι για τη γνωριμία!
    el-Latn: Khairemai gia ti gnorimia!
    phase: encounter
    notes: Pleased to make your acquaintance!

  # --- 6. Phone ---
  - text: Ναι;
    el-Latn: Nai?
    phase: encounter
    setting: [chat]
    notes: 'Answering phone: ''Yes?'' (Informal)'

  - text: Παρακαλώ;
    el-Latn: Parakalo?
    phase: encounter
    setting: [chat]
    notes: 'Answering phone: ''Please?'' (Universal)'

  - text: Λέγετε!
    el-Latn: Legete!
    phase: encounter
    setting: [chat]
    notes: 'Answering phone: ''Speak'' (Standard)'

  # --- Fallback ---
  - text: Γεια σας
    el-Latn: Ya sas!
    phase: [encounter, parting]
    audience: ">1"
    notes: Standard respectful greeting for groups.
