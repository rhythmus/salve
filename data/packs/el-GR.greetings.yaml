locale: el-GR
sources: 'https://www.greekpod101.com/blog/2019/01/12/how-to-say-hello-in-greek/'

greetings:

  # Saying Hello & Goodbye

  - text: Γεια!
    el-Latn: Ya!
    phase: [encounter, parting]
    formality: informal
    notes: Basic 'Hi/Hello'. Often short for Γεια σου/σας.

  - text: Γεια σου!
    el-Latn: Ya su!
    phase: [encounter, parting]
    formality: informal
    audienceSize: 1
    notes: Informal 'Hello' to one person.

  - text: Γεια σας!
    el-Latn: Ya sas!
    phase: [encounter, parting]
    formality: formal
    audienceSize: 1
    notes: Formal 'Hello' to one person.

  - text: Γεια σας!
    el-Latn: Ya sas!
    phase: [encounter, parting]
    formality: informal
    audienceSize: ">1"
    notes: Informal 'Hello' to a group.

  - text: Χαίρετε!
    el-Latn: Khairete!
    phase: encounter
    formality: formal
    audienceSize: ">=1"
    notes: Polite/Formal 'Hello' to one person or a group.

  # Parting Specifically

  - text: Τα λέμε!
    el-Latn: Ta leme!
    phase: parting
    notes: See you!

  - text: ["Γεια! Τα λέμε!", "Γεια, τα λέμε!"]
    el-Latn: ["Ya! Ta leme!", "Ya, ta leme!"]
    phase: parting
    notes: See you!

  - text: Αντίο
    el-Latn: Adío
    phase: parting
    formality: formal
    notes: Goodbye. Used for permanent or long-term parting.

  - text: Εις το επανιδείν!
    el-Latn: Eis to epanidín!
    phase: parting
    formality: formal
    style: poetic
    notes: Farewell. More sophisticated version of 'See you again'. Litt. “To the seeing-each-other-again!”

  # Time of Day

  - text: Καλημέρα!
    el-Latn: Kaliméra!
    phase: encounter
    timeOfDay: morning
    notes:
      - Good morning! (Usually until 12pm)
      - "As in English, Καλημέρα consists of two separate words combined into one: Καλή + μέρα (kalí + méra) = “good” + “morning.”"

  - text: Καλησπέρα!
    el-Latn: Kalispéra!
    phase: encounter
    timeOfDay: [afternoon, evening]
    notes:
      - Good afternoon! (12pm until late evening)
      - "Καλησπέρα consists of two separate words combined into one: Καλή + (ε)σπέρα (kalí + (e)spéra) = “good” + “afternoon.”"

  - text: Καλό απόγευμα!
    el-Latn: Kaló apóyevma!
    phase: parting
    timeOfDay: [midday, afternoon]
    notes: Have a good afternoon! (Used when parting)

  - text: Καλό βράδυ!
    el-Latn: Kaló vrádi!
    phase: parting
    timeOfDay: evening
    notes: Have a good evening! (Used when parting)

  - text: Καληνύχτα!
    el-Latn: Kaliníhta!
    phase: parting
    timeOfDay: [evening, night]
    notes: Goodnight!

  - text: ["Καληνύχτα! Όνειρα γλυκά!", "Καλό βράδυ! Όνειρα γλυκά!", "Όνειρα γλυκά!"]
    el-Latn: Oneira glyka!
    phase: parting
    formality: informal
    relationship: intimate
    timeOfDay: night
    notes: Sweet dreams. Usually follows Καληνύχτα.

  # Slang & Special

  - text: Γεια χαρά!
    el-Latn: Ya hará!
    phase: encounter
    formality: highly informal
    notes: Hey! (Slang)

  - text: Γιο!
    el-Latn: Yo!
    phase: encounter
    formality: highly informal
    notes: Yo! (Slang)

  - text: ["Χρόνια και ζαμάνια!", "Γεια χαρά! Χρόνια και ζαμάνια!", "Γιο! Χρόνια και ζαμάνια!"]
    el-Latn: Hrónia ke zamánia!
    phase: encounter
    notes: Long time no see!

  # Meeting New People

  - text: Χαίρω πολύ!
    el-Latn: Héro Polí!
    phase: encounter
    notes: Pleased to meet you!

  - text: Χάρηκα!
    el-Latn: Ηárika!
    phase: [encounter, parting]
    notes: Pleased (to have met you)!

  - text: Χαίρομαι για τη γνωριμία!
    el-Latn: Hérome ya ti gnorimía!
    phase: encounter
    notes: Pleased to make your acquaintance!

  # Phone

  - text: Ναι;
    el-Latn: Nai?
    phase: encounter
    formality: informal
    relationship: friend
    setting: [chat_message, phone]
    notes: 'Answering phone: "Yes?" (Informal)'

  - text: Παρακαλώ;
    el-Latn: Parakaló?
    phase: encounter
    setting: [chat_message, phone]
    notes: 'Answering phone: "Please?"" (Universal)'

  - text: Λέγετε!
    el-Latn: Légete!
    phase: encounter
    setting: [chat_message, phone]
    notes: 'Answering phone: "Speak" (Standard)'

  - text: Λέγετε, παρακαλώ!
    el-Latn: Légete, parakaló!
    formality: formal
    phase: encounter
    setting: [chat_message, phone]
    notes: 'Answering phone: "Speak, please" (Standard)'

  - text: Εμπρός!
    el-Latn: Emprós!
    phase: encounter
    setting: [chat_message, phone]
